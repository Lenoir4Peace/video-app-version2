<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéoconférence Python</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d1a; color: #fff; font-family: sans-serif; min-height: 100vh; }

  header {
    background: #13132b;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2a4a;
  }
  header h1 { font-size: 18px; color: #7c83fd; }
  #status {
    font-size: 13px; padding: 4px 12px;
    border-radius: 20px; background: #1e1e3a; color: #aaa;
  }
  #status.connected { background: #0f3d2a; color: #2ecc71; }

  #join-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: calc(100vh - 56px); gap: 16px; padding: 20px;
  }
  #join-screen h2 { color: #7c83fd; font-size: 24px; }
  #join-screen p { color: #aaa; font-size: 14px; text-align: center; }

  input[type="text"] {
    padding: 10px 16px; border-radius: 8px;
    border: 1px solid #2a2a4a; background: #1a1a2e;
    color: #fff; font-size: 16px; width: 280px; text-align: center;
  }

  button {
    padding: 10px 28px; border-radius: 8px; border: none;
    background: #7c83fd; color: #fff; font-size: 16px;
    cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #5c63dd; }
  button.danger { background: #c0392b; }
  button.danger:hover { background: #a93226; }

  #conference-screen { display: none; padding: 12px; }

  #controls {
    display: flex; gap: 10px; margin-bottom: 12px;
    flex-wrap: wrap; align-items: center;
  }
  #participant-count {
    margin-left: auto; font-size: 13px; color: #aaa;
    background: #1a1a2e; padding: 6px 12px; border-radius: 20px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  @media (max-width: 900px) { #grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { #grid { grid-template-columns: repeat(2, 1fr); } }

  .video-cell {
    position: relative; background: #1a1a2e;
    border-radius: 8px; overflow: hidden;
    aspect-ratio: 16/9; border: 1px solid #2a2a4a;
    display: flex; align-items: center; justify-content: center;
  }
  .video-cell video { width: 100%; height: 100%; object-fit: cover; }
  .video-cell .name-tag {
    position: absolute; bottom: 6px; left: 6px;
    background: rgba(0,0,0,0.65); color: #fff;
    font-size: 12px; font-weight: bold;
    padding: 3px 10px; border-radius: 4px;
  }
  .video-cell .placeholder { color: #555; font-size: 12px; text-align: center; padding: 8px; }
  .video-cell.active { border-color: #7c83fd; }
  .video-cell.local { border-color: #2ecc71; }

  #local-preview {
    width: 120px; height: 68px; object-fit: cover;
    border-radius: 6px; border: 2px solid #2ecc71;
  }
  .btn-icon { padding: 8px 16px; font-size: 13px; }
  .btn-icon.muted { background: #555; }

  #error-msg { color: #e74c3c; display: none; font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>Vidéoconférence Python</h1>
  <span id="status">Déconnecté</span>
</header>

<div id="join-screen">
  <h2>Rejoindre la conférence</h2>
  <p>Entrez votre nom pour rejoindre</p>
  <input type="text" id="name-input" placeholder="Votre nom" maxlength="20">
  <input type="text" id="room-input" placeholder="Salle (ex: salle1)" value="salle1" maxlength="20">
  <button onclick="joinConference()">Rejoindre</button>
  <p id="error-msg"></p>
</div>

<div id="conference-screen">
  <div id="controls">
    <video id="local-preview" autoplay muted playsinline></video>
    <button class="btn-icon" id="btn-mic" onclick="toggleMic()">Micro ON</button>
    <button class="btn-icon" id="btn-cam" onclick="toggleCam()">Caméra ON</button>
    <button class="btn-icon danger" onclick="leaveConference()">Quitter</button>
    <span id="participant-count">0 / 20 participants</span>
  </div>
  <div id="grid"></div>
</div>

<script>
const MAX_PEERS = 20;
let ws = null;
let myId = null;
let myName = "";
let localStream = null;
let peers = {};       // { peerId: RTCPeerConnection }
let peerNames = {};   // { peerId: name }
let micEnabled = true;
let camEnabled = true;

const iceConfig = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}

async function joinConference() {
  myName = document.getElementById("name-input").value.trim();
  const room = document.getElementById("room-input").value.trim() || "salle1";
  if (!myName) { showError("Entre ton nom !"); return; }

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
    } catch(e2) {
      showError("Impossible d'accéder à la caméra/micro : " + e2.message);
      return;
    }
  }

  document.getElementById("local-preview").srcObject = localStream;
  document.getElementById("join-screen").style.display = "none";
  document.getElementById("conference-screen").style.display = "block";

  buildGrid();

  const protocol = location.protocol === "https:" ? "wss" : "ws";
  const wsUrl = `${protocol}://${location.host}/ws?room=${room}&name=${encodeURIComponent(myName)}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => setStatus("Connecté", true);
  ws.onmessage = async (event) => await handleSignal(JSON.parse(event.data));
  ws.onclose = () => setStatus("Déconnecté", false);
}

function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (let i = 0; i < MAX_PEERS; i++) {
    const cell = document.createElement("div");
    cell.className = "video-cell";
    cell.id = `cell-${i}`;
    cell.innerHTML = `<span class="placeholder">Case ${i+1}<br>En attente...</span>`;
    grid.appendChild(cell);
  }
}

function setStatus(text, connected) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = connected ? "connected" : "";
}

function updateCount() {
  const count = Object.keys(peers).length + 1;
  document.getElementById("participant-count").textContent = `${count} / ${MAX_PEERS} participants`;
}

function getFreeCell() {
  for (let i = 1; i < MAX_PEERS; i++) {
    const cell = document.getElementById(`cell-${i}`);
    if (cell && !cell.dataset.peerId) return i;
  }
  return -1;
}

function placeVideo(peerId, stream, name) {
  const idx = getFreeCell();
  if (idx < 0) return;
  const cell = document.getElementById(`cell-${idx}`);
  cell.dataset.peerId = peerId;
  cell.className = "video-cell active";
  cell.innerHTML = `
    <video autoplay playsinline id="video-${peerId}"></video>
    <span class="name-tag">${name || peerId}</span>
  `;
  document.getElementById(`video-${peerId}`).srcObject = stream;
  updateCount();
}

function removeVideo(peerId) {
  for (let i = 0; i < MAX_PEERS; i++) {
    const cell = document.getElementById(`cell-${i}`);
    if (cell && cell.dataset.peerId === peerId) {
      cell.dataset.peerId = "";
      cell.className = "video-cell";
      cell.innerHTML = `<span class="placeholder">Case ${i+1}<br>En attente...</span>`;
      break;
    }
  }
  updateCount();
}

function placeLocalVideo() {
  const cell = document.getElementById("cell-0");
  cell.className = "video-cell local";
  cell.innerHTML = `
    <video autoplay muted playsinline id="video-local"></video>
    <span class="name-tag">${myName} (moi)</span>
  `;
  document.getElementById("video-local").srcObject = localStream;
}

async function createPeerConnection(peerId, peerName) {
  const pc = new RTCPeerConnection(iceConfig);
  peers[peerId] = pc;
  peerNames[peerId] = peerName || peerId;

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (event) => {
    placeVideo(peerId, event.streams[0], peerNames[peerId]);
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      ws.send(JSON.stringify({
        type: "ice-candidate",
        to: peerId,
        candidate: event.candidate
      }));
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === "disconnected" || pc.connectionState === "failed") {
      removeVideo(peerId);
      pc.close();
      delete peers[peerId];
      delete peerNames[peerId];
    }
  };

  return pc;
}

async function handleSignal(data) {
  switch(data.type) {

    case "existing-peers":
      myId = data["your-id"];
      myName = data["your-name"] || myName;
      placeLocalVideo();
      updateCount();
      for (const peer of data.peers) {
        peerNames[peer.id] = peer.name;
        const pc = await createPeerConnection(peer.id, peer.name);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: "offer", to: peer.id, sdp: offer.sdp }));
      }
      break;

    case "user-joined":
      peerNames[data.id] = data.name;
      console.log(`Nouveau participant: ${data.name}`);
      break;

    case "user-left":
      if (peers[data.from || data.id]) {
        removeVideo(data.from || data.id);
        peers[data.from || data.id].close();
        delete peers[data.from || data.id];
        delete peerNames[data.from || data.id];
      }
      break;

    case "offer":
      const pc = await createPeerConnection(data.from, data["from-name"]);
      await pc.setRemoteDescription({ type: "offer", sdp: data.sdp });
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: "answer", to: data.from, sdp: answer.sdp }));
      break;

    case "answer":
      if (peers[data.from]) {
        await peers[data.from].setRemoteDescription({ type: "answer", sdp: data.sdp });
      }
      break;

    case "ice-candidate":
      if (peers[data.from] && data.candidate) {
        await peers[data.from].addIceCandidate(data.candidate);
      }
      break;
  }
}

function toggleMic() {
  micEnabled = !micEnabled;
  localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  document.getElementById("btn-mic").textContent = micEnabled ? "Micro ON" : "Micro OFF";
  document.getElementById("btn-mic").className = micEnabled ? "btn-icon" : "btn-icon muted";
}

function toggleCam() {
  camEnabled = !camEnabled;
  localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
  document.getElementById("btn-cam").textContent = camEnabled ? "Caméra ON" : "Caméra OFF";
  document.getElementById("btn-cam").className = camEnabled ? "btn-icon" : "btn-icon muted";
}

function leaveConference() {
  if (ws) ws.close();
  localStream.getTracks().forEach(t => t.stop());
  Object.values(peers).forEach(pc => pc.close());
  peers = {};
  peerNames = {};
  location.reload();
}
</script>
</body>
</html>
